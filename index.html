<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ETF 모니터">
<title>ETF 포트폴리오 모니터</title>
<link rel="manifest" href="manifest.json">

<style>
:root {
  --bg:       #0f1117;
  --surface:  #1a1d27;
  --card:     #21253a;
  --border:   #2d3348;
  --text:     #e8eaf0;
  --muted:    #7a8299;
  --accent:   #6c8efb;
  --success:  #34d399;
  --danger:   #f87171;
  --warning:  #fbbf24;
  --purple:   #a78bfa;
  --teal:     #2dd4bf;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Noto Sans KR', sans-serif; min-height: 100vh; padding-bottom: env(safe-area-inset-bottom); }

/* 헤더 */
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 16px 10px; position: sticky; top: 0; z-index: 100; }
.header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.header h1 { font-size: 16px; font-weight: 700; color: var(--text); }
.updated { font-size: 10px; color: var(--muted); }
.refresh-btn { background: var(--card); border: 1px solid var(--border); color: var(--accent); padding: 6px 12px; border-radius: 8px; font-size: 11px; cursor: pointer; }

/* 최상단 히어로 요약 */
.hero { margin: 12px 14px 4px; background: linear-gradient(135deg, #232849, #1a1d33); border: 1px solid var(--border); border-radius: 14px; padding: 16px; }
.hero-row { display: flex; justify-content: space-between; align-items: flex-end; }
.hero-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.hero-val { font-size: 24px; font-weight: 800; }
.hero-chg { font-size: 13px; font-weight: 700; text-align: right; }
.hero-chg-sub { font-size: 10px; color: var(--muted); text-align: right; margin-top: 2px; }
.hero-div { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.hero-div-label { font-size: 11px; color: var(--muted); }
.hero-div-val { font-size: 16px; font-weight: 700; color: var(--warning); }

/* 탭 */
.tabs { display: flex; gap: 0; overflow-x: auto; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab { padding: 7px 13px; font-size: 11px; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; background: none; border-top: none; border-left: none; border-right: none; color: var(--muted); font-family: inherit; flex-shrink: 0; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* 요약 */
.summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 12px 14px; }
.sum-card { background: var(--card); border-radius: 10px; padding: 10px 12px; border: 1px solid var(--border); }
.sum-label { font-size: 9px; color: var(--muted); margin-bottom: 4px; }
.sum-val { font-size: 20px; font-weight: 700; }
.sum-sub { font-size: 9px; color: var(--muted); margin-top: 2px; }

/* 섹션 제목 */
.section-title { font-size: 10px; color: var(--muted); padding: 10px 14px 4px; letter-spacing: .06em; }

/* ETF 카드 */
.etf-list { padding: 0 14px 20px; display: flex; flex-direction: column; gap: 8px; }
.etf-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: border-color .2s; }
.etf-card.ok { border-left: 3px solid var(--success); }
.etf-card.fail { border-left: 3px solid var(--danger); }
.etf-card.pending { border-left: 3px solid var(--border); }

.card-head { display: flex; justify-content: space-between; align-items: flex-start; padding: 12px 14px 8px; gap: 8px; cursor: pointer; }
.card-name { font-size: 13px; font-weight: 600; line-height: 1.35; }
.card-meta { font-size: 10px; color: var(--muted); margin-top: 2px; }

.tag { font-size: 9px; padding: 2px 7px; border-radius: 5px; white-space: nowrap; font-weight: 600; flex-shrink: 0; }
.tag-kr_idx { background: #1a2f4a; color: #6aadff; }
.tag-us_idx { background: #1a3a2a; color: #4fd98e; }
.tag-kr_div { background: #3a1a2a; color: #f472b6; }
.tag-us_div { background: #281a4a; color: #a78bfa; }

/* 지표 그리드 */
.metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); }
.metric { background: var(--surface); padding: 8px 6px; text-align: center; }
.metric-label { font-size: 8px; color: var(--muted); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.metric-val { font-size: 13px; font-weight: 700; }
.pos { color: var(--danger); }   /* 한국식: 상승=빨강 */
.neg { color: var(--accent); }   /* 하락=파랑 */
.flat { color: var(--muted); }

/* 확장 상세 */
.card-detail { display: none; padding: 10px 14px 12px; border-top: 1px solid var(--border); }
.card-detail.open { display: block; }
.detail-row { display: flex; justify-content: space-between; font-size: 11px; padding: 4px 0; border-bottom: 1px solid var(--border); }
.detail-row:last-child { border: none; }
.detail-label { color: var(--muted); }
.detail-val { font-weight: 600; }

/* 로딩 */
.loading { text-align: center; padding: 60px 20px; color: var(--muted); }
.spinner { font-size: 32px; animation: spin 1s linear infinite; display: inline-block; margin-bottom: 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* 에러 배너 */
.error-banner { background: #2a0808; border: 1px solid #7f1d1d; color: var(--danger); padding: 10px 14px; font-size: 12px; margin: 10px 14px; border-radius: 8px; display: none; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>📊 ETF 모니터</h1>
    <button class="refresh-btn" onclick="loadData()">↻ 새로고침</button>
  </div>
  <div id="live-badge" class="updated"></div>
</div>

<div id="hero"></div>

<div class="header" style="position:sticky; top:0; padding-top:6px;">
  <div class="tabs" id="tab-nav"></div>
</div>

<div id="error-banner" class="error-banner"></div>
<div id="app-content"><div class="loading"><div class="spinner">⏳</div><br>데이터 로딩 중...</div></div>

<script>
const CAT_LABELS = {kr_idx:"🇰🇷 한국지수", kr_div:"🇰🇷 한국배당", us_idx:"🇺🇸 미국지수", us_div:"🇺🇸 미국배당"};

const TABS = [
  {id:"all",    label:"전체"},
  {id:"kr_idx", label:"🇰🇷 한국지수"},
  {id:"kr_div", label:"🇰🇷 한국배당"},
  {id:"us_idx", label:"🇺🇸 미국지수"},
  {id:"us_div", label:"🇺🇸 미국배당"},
];

let allData = { etfs: [] };
let allHistory = {series:{}};
let activeTab = "all";
let openCards = new Set();

// ── 누적 추이 ──
function trendHTML(id){
  const arr = (allHistory.series && allHistory.series[id]) || [];
  if(arr.length < 2) return `<div class="detail-row"><span class="detail-label">최근 추이</span><span class="detail-val">데이터 누적 중</span></div>`;
  const last = arr[arr.length-1];
  const refIdx = Math.max(0, arr.length-6);
  const ref = arr[refIdx];
  const lastP = parseFloat(last.p), refP = parseFloat(ref.p);
  if(!lastP || !refP) return "";
  const diffPct = ((lastP-refP)/refP*100);
  const cls = diffPct>0?"pos":diffPct<0?"neg":"flat";
  const sign = diffPct>0?"+":"";
  return `<div class="detail-row"><span class="detail-label">${ref.d} 대비</span><span class="detail-val ${cls}">${sign}${diffPct.toFixed(2)}% (${arr.length}일 누적)</span></div>`;
}

function chgClass(v, dir){
  if(!v) return "flat";
  if(dir==="up") return "pos";
  if(dir==="dn") return "neg";
  const n = parseFloat(v);
  return n>0?"pos":n<0?"neg":"flat";
}

function fmt(v){ return (v||v===0) ? Number(v).toLocaleString("ko-KR") : "—"; }

// ── 카드 렌더 ──
function cardHTML(e){
  const cat = e.cat || "kr_idx";
  const isOpen = openCards.has(e.id);
  const statusClass = e.fetch_ok ? "ok" : (e.price ? "pending" : "fail");
  const chgDisplay = e.chg ? (e.chg_dir==="up"?"+":"")+e.chg+"%" : "—";

  const price = parseFloat(e.price) || 0;
  const qty = e.qty || 0;
  const avg = e.avg_price || 0;
  const value = qty * price;
  const cost = qty * avg;
  const pnl = value - cost;
  const pnlPct = cost > 0 ? (pnl/cost*100) : 0;
  const monthlyDist = (e.myield && price) ? Math.round(qty * price * e.myield / 100) : 0;

  return `
<div class="etf-card ${statusClass}" id="card-${e.id}">
  <div class="card-head" onclick="toggleCard('${e.id}')">
    <div style="min-width:0">
      <div class="card-name">${e.name}</div>
      <div class="card-meta">${e.code} · ${qty.toLocaleString("ko-KR")}주 보유</div>
    </div>
    <span class="tag tag-${cat}">${CAT_LABELS[cat]||""}</span>
  </div>
  <div class="metrics">
    <div class="metric">
      <div class="metric-label">현재가</div>
      <div class="metric-val" style="font-size:11px">${e.price ? fmt(e.price)+"원" : "—"}</div>
    </div>
    <div class="metric">
      <div class="metric-label">등락</div>
      <div class="metric-val ${chgClass(e.chg, e.chg_dir)}">${chgDisplay}</div>
    </div>
    <div class="metric">
      <div class="metric-label">평가금액</div>
      <div class="metric-val" style="font-size:11px">${fmt(Math.round(value))}원</div>
    </div>
    <div class="metric">
      <div class="metric-label">평가손익</div>
      <div class="metric-val ${pnl>=0?'pos':'neg'}" style="font-size:11px">${pnl>=0?'+':''}${pnlPct.toFixed(1)}%</div>
    </div>
  </div>
  <div class="card-detail ${isOpen?"open":""}">
    <div class="detail-row"><span class="detail-label">보유수량</span><span class="detail-val">${qty.toLocaleString("ko-KR")}주</span></div>
    <div class="detail-row"><span class="detail-label">평균매입가</span><span class="detail-val">${fmt(avg)}원</span></div>
    <div class="detail-row"><span class="detail-label">평가손익</span><span class="detail-val ${pnl>=0?'pos':'neg'}">${pnl>=0?'+':''}${fmt(Math.round(pnl))}원 (${pnl>=0?'+':''}${pnlPct.toFixed(2)}%)</span></div>
    <div class="detail-row"><span class="detail-label">월배당율</span><span class="detail-val">${e.myield ? e.myield+"%" : "—"}</span></div>
    <div class="detail-row"><span class="detail-label">이번달 예상 분배금</span><span class="detail-val">${monthlyDist ? fmt(monthlyDist)+"원" : "—"}</span></div>
    <div class="detail-row"><span class="detail-label">NAV</span><span class="detail-val">${fmt(e.nav)}원</span></div>
    <div class="detail-row"><span class="detail-label">순자산(AUM)</span><span class="detail-val">${fmt(e.aum)}억원</span></div>
    <div class="detail-row"><span class="detail-label">52주 최고</span><span class="detail-val">${fmt(e.w52_high)}원</span></div>
    <div class="detail-row"><span class="detail-label">52주 최저</span><span class="detail-val">${fmt(e.w52_low)}원</span></div>
    ${trendHTML(e.id)}
    <div class="detail-row"><span class="detail-label">마지막 갱신</span><span class="detail-val">${e.updated||"—"}</span></div>
  </div>
</div>`;
}

// ── 최상단 히어로 요약 (보유금액 · 전일대비 · 이번달 분배금) ──
function renderHero(){
  const badge = document.getElementById("live-badge");
  if(badge){
    badge.textContent = `⏱ ${allData.updated||"—"} 기준 (평일 10·12·14·16시 자동갱신)`;
  }

  const etfs = allData.etfs || [];
  let totalValue=0, totalCost=0, totalDayChange=0, totalMonthlyDist=0;

  etfs.forEach(e=>{
    const price = parseFloat(e.price) || 0;
    const qty = e.qty || 0;
    const value = qty * price;
    totalValue += value;
    totalCost += qty * (e.avg_price || 0);
    const chgPct = parseFloat(e.chg) || 0;
    const signedPct = e.chg_dir==="up" ? chgPct : e.chg_dir==="dn" ? -chgPct : 0;
    totalDayChange += value * signedPct / 100;
    if(e.myield && price) totalMonthlyDist += qty * price * e.myield / 100;
  });

  const prevValue = totalValue - totalDayChange;
  const dayPct = prevValue>0 ? (totalDayChange/prevValue*100) : 0;
  const chgCls = totalDayChange>=0 ? "pos" : "neg";
  const chgSign = totalDayChange>=0 ? "▲" : "▼";

  document.getElementById("hero").innerHTML = `
<div class="hero">
  <div class="hero-row">
    <div>
      <div class="hero-label">현재 보유금액</div>
      <div class="hero-val">${fmt(Math.round(totalValue))}원</div>
    </div>
    <div>
      <div class="hero-chg ${chgCls}">${chgSign} ${fmt(Math.abs(Math.round(totalDayChange)))}원</div>
      <div class="hero-chg-sub ${chgCls}">(${totalDayChange>=0?'+':''}${dayPct.toFixed(2)}% 전일대비)</div>
    </div>
  </div>
  <div class="hero-div">
    <span class="hero-div-label">💰 이번달 예상 분배금</span>
    <span class="hero-div-val">${fmt(Math.round(totalMonthlyDist))}원</span>
  </div>
</div>`;
}

// ── 카테고리 요약 ──
function summaryHTML(etfs){
  const up = etfs.filter(e=>e.chg_dir==="up").length;
  const dn = etfs.filter(e=>e.chg_dir==="dn").length;
  const ok = etfs.filter(e=>e.fetch_ok).length;
  const value = etfs.reduce((s,e)=> s + (e.qty||0)*(parseFloat(e.price)||0), 0);
  return `
<div class="summary">
  <div class="sum-card">
    <div class="sum-label">보유종목</div>
    <div class="sum-val" style="color:var(--accent)">${etfs.length}</div>
    <div class="sum-sub">수집성공 ${ok}개</div>
  </div>
  <div class="sum-card">
    <div class="sum-label">상승/하락</div>
    <div class="sum-val"><span style="color:var(--danger)">▲${up}</span> <span style="color:var(--accent)">▼${dn}</span></div>
    <div class="sum-sub">보합 ${etfs.length-up-dn}개</div>
  </div>
  <div class="sum-card">
    <div class="sum-label">구간 평가금액</div>
    <div class="sum-val" style="font-size:13px;color:var(--success)">${fmt(Math.round(value))}원</div>
    <div class="sum-sub">평일 16:00 자동갱신</div>
  </div>
</div>`;
}

// ── 탭 렌더 ──
function renderTab(){
  document.getElementById("tab-nav").innerHTML = TABS.map(t=>
    `<button class="tab${activeTab===t.id?" active":""}" onclick="switchTab('${t.id}')">${t.label}</button>`
  ).join("");

  const etfs = activeTab==="all" ? allData.etfs : allData.etfs.filter(e=>e.cat===activeTab);

  let html = summaryHTML(etfs);

  if(activeTab==="all"){
    ["kr_idx","kr_div","us_idx","us_div"].forEach(cat=>{
      const group = etfs.filter(e=>e.cat===cat);
      if(!group.length) return;
      html += `<div class="section-title">${CAT_LABELS[cat]}</div><div class="etf-list">${group.map(cardHTML).join("")}</div>`;
    });
  } else {
    html += `<div class="etf-list">${etfs.map(cardHTML).join("")}</div>`;
  }

  document.getElementById("app-content").innerHTML = html;
  renderHero();
}

function switchTab(id){ activeTab=id; renderTab(); }
function toggleCard(id){ openCards.has(id)?openCards.delete(id):openCards.add(id); renderTab(); }

// ── 데이터 로드 ──
async function loadData(){
  document.getElementById("app-content").innerHTML =
    `<div class="loading"><div class="spinner">⏳</div><br>데이터 로딩 중...</div>`;
  document.getElementById("error-banner").style.display = "none";

  try {
    const res = await fetch("data/etf_data.json?t="+Date.now());
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    allData = await res.json();

    try {
      const hres = await fetch("data/history.json?t="+Date.now());
      if(hres.ok) allHistory = await hres.json();
    } catch(_) { /* history 없어도 정상 동작 */ }

    renderTab();
  } catch(e) {
    console.warn("데이터 로드 실패:", e.message);
    allData = { updated: "—", etfs: [] };
    const banner = document.getElementById("error-banner");
    banner.style.display = "block";
    banner.textContent = "⚠ 데이터 파일을 찾을 수 없습니다. GitHub Actions를 먼저 실행해 주세요.";
    renderTab();
  }
}

loadData();
</script>
</body>
</html>
