      #     curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
      #       -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
      #       -d "text=📊 ETF 주간 리포트 업데이트 완료! https://YOUR_ID.github.io/etf-monitor"
