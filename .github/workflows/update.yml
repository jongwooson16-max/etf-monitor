name: ETF 데이터 자동 업데이트 및 배포

on:
  schedule:
   - cron: "0 7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: ETF 데이터 수집
        run: python crawl.py

      - name: 데이터 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/etf_data.json data/history.json
          git diff --staged --quiet || git commit -m "📊 ETF 자동 업데이트"
          git push

  deploy:
    needs: crawl
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pages 설정
        uses: actions/configure-pages@v5

      - name: 파일 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: 배포
        id: deployment
        uses: actions/deploy-pages@v5
